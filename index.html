<!DOCTYPE html>
<html>
<head>
    <title>3D Prototype Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <div class="filter-bar" style="text-align: center; margin-bottom: 30px;">
    <button onclick="filterParts('all')" class="filter-btn">All Parts</button>
    <button onclick="filterParts('mounting')" class="filter-btn">Mounts & Brackets</button>
    <button onclick="filterParts('electronics')" class="filter-btn">Electronics/Motors</button>
</div>

<style>
    .filter-btn {
        background: transparent;
        color: #888;
        border: 1px solid #444;
        padding: 8px 20px;
        margin: 5px;
        cursor: pointer;
        border-radius: 20px;
        transition: 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
        border-color: #007bff;
        color: white;
    }
</style>
    <div class="card">
    <model-viewer 
        src="Nema17.glb" 
        poster="photos/nema17.webp"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
    </model-viewer>

    <div class="info">
        <h3>NEMA 17 Stepper Motor</h3>
        <p>Precision Digital Twin | Standard 40mm Body</p>
        
        <div class="btn-group">
            <a href="models/Nema_17/Nema17.stp" class="btn primary">Download STEP</a>
        </div>
    </div>
</div>
</head>
<body>
    <model-viewer src="Part1.glb" poster="photos/poster.webp" ar camera-controls shadow-intensity="1" touch-action="pan-y"
        ar
        ar-modes="webxr screen-viewer quick-look"
        ar-scale="fixed"
        scale = "0.001 0.001 0.001"
        camera-controls
        shadow-intensity ="1"
        
        ></model-viewer>
    
</body>
</html>
